spring:
  application:
    name: job-queue

  datasource:
    url: jdbc:postgresql://localhost:5432/jobqueue
    username: jobuser
    password: jobpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: job-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.jobqueue.dto

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: super-secret-jwt-signing-key-that-is-at-least-256-bits-long!!
    ttl: PT1H
  kafka:
    topics:
      word-count: jobs.wordcount
      reverse-string: jobs.reverse
  job:
    max-retries: 3

server:
  port: 8080
